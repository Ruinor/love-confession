<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yippieee</title>
    <style>
       body {
    background: linear-gradient(to right, #ff9a9e, #fecfef);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
h1 {
    font-family: 'Dancing Script', cursive;
    color: #8b0000;
    font-size: 42px;
    margin-bottom: 20px;
}
.heart {
    position: absolute;
    font-size: 24px;
    animation: floatUp 4s linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
    </style>
</head>
<body>
     <img src="https://media1.tenor.com/m/lpbyJK23sNUAAAAC/bear-kiss-bear-kisses.gif">
     <h1>Welcome to my heart sweetheart</h1>
     <p> Let's stay together in our hard, happy, sad, good, bad time. Hope i can make you more happy and fulfilled this time</p>
<script>
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");

    const hearts = ["💖","💘","💝","❤️"];
    heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

    heart.style.left = Math.random() * window.innerWidth + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 4000);
}

// continuous hearts
setInterval(createHeart, 300);
</script>
</body>
</html>
